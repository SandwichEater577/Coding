services:
  postgres:
    image: postgres:17-alpine
    container_name: technicasino-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: technicasino
      POSTGRES_PASSWORD: password
      POSTGRES_DB: technicasino
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: technicasino-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
