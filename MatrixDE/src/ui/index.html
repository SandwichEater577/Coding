<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix TWM UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Matrix digital rain background -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Overlay content -->
    <div id="ui-container">
        <!-- Notification Widget -->
        <div id="notification-center">
            <div class="notification">
                <span class="icon">🔔</span>
                <span class="text">System: System updated. Matrix Protocol v1.4 active.</span>
            </div>
        </div>

        <!-- Tiling Window Area (Reserved for C++ compositor/X11 to overlay over) -->
        <div id="workspace-area">
            <!-- This area remains empty in HTML. Modifiers from WM will show windows here -->
        </div>

        <!-- Taskbar -->
        <div id="taskbar">
            <!-- Left side: App Launchers -->
            <div class="launcher-group">
                <div class="app-icon" onclick="launchApp('terminal')" title="Terminal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                </div>
                <div class="app-icon" onclick="launchApp('files')" title="Files">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                </div>
                <div class="app-icon" onclick="launchApp('browser')" title="Browser">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                </div>
                <div class="app-icon" onclick="launchApp('spotify')" title="Spotify">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 11.973c2.5-1.473 5.5-.973 7.5.527M9 15c1.5-1 4-1 5 .5M7 9c3-2 6-2 9 0"></path></svg>
                </div>
                <div class="app-icon" onclick="launchApp('discord')" title="Discord">
                     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 5.5s-2-1.5-4.5-1.5c-1 0-1.5.5-1.5 0S12 3 12 3s-1 1-1 1-.5-.5-1.5 0-4.5 1.5-4.5 1.5-2.5 5.5-2.5 9.5c0 0 1 3 5.5 4.5 0 0 1-1.5 1.5-3 0 0-1 .5-2 1 .5-.5 1-1 1.5-1.5.5.5 2 1 4 1s3.5-.5 4-1c.5.5 1 1 1.5 1.5-1-.5-2-1-2-1 1.5 1.5 2.5 3 2.5 3 4.5-1.5 5.5-4.5 5.5-4.5S21.5 9.5 19 5.5z"></path></svg>
                </div>
            </div>

            <!-- Right side: System Tray -->
            <div class="sys-tray">
                <span id="network-status" title="Connected">🌐</span>
                <span id="volume-status" title="Volume: 80%">🔊</span>
                <span id="clock">00:00</span>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
