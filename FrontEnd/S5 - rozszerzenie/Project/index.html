<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>

  <body>
    <header id="topbar">
      <div id="logo">
        <span id="logo-text">TechniHack</span>
      </div>
      <div id="system-stats">
        <div class="stat" id="stat-ip">
          <span class="stat-label">IP:</span>
          <span>0.0.0.0</span>
        </div>
        <div class="stat" id="stat-trace">
          <span class="stat-label">Trace:</span>
          <span>0.0.0.0</span>
        </div>
        <div class="stat" id="stat-level">
          <span class="stat-label">Level:</span>
          <span>0</span>
        </div>
      </div>
      <div id="clock">
        <div id="clock-date">Date:</div>
        <div id="clock-sep">Dot</div>
        <div id="clock-time">Time:</div>
      </div>
    </header>
    <main id="app">
      <nav id="sidebar">
        <div id="sidebar-heading">Misje</div>
        <div id="mission-list">
          <div class="mission mission--done" id="mission-1">01 - Tutorial</div>
          <div class="mission mission--active" id="mission-2">
            02 - Alpha007
          </div>
          <div class="mission mission--locked" id="mission-3">
            03 - Nexus-DB
          </div>
          <div class="mission mission--locked" id="mission-4">
            04 - Ghost-Net
          </div>
        </div>
        <div id="progress-panel">
          <div class="progress-row" id="progress-mission">
            <!--'Postep misji' i progress bar-->
            <span class="progress-label">postep</span>
          </div>
          <div class="progress-row" id="progress-time">
            <!--'Saldo Czasu' i progress bar-->
            <span class="progress-label">saldo</span>
          </div>
        </div>
      </nav>
      <div id="terminal">
        <div id="output"><span>OutPut</span></div>
        <div id="input-bar"><span>InPut</span></div>
        <div id="shortcuts">
          <div class="shortcut" id="shortcut-tab">
            <div class="shortcut-key">TAB</div>
            <div class="shortcut-desc"><span>autocomplete</span></div>
          </div>
          <div class="shortcut" id="shortcut-history">
            <div class="shortcut-key">up&amp;&amp;down</div>
            <div class="shortcut-desc"><span>history</span></div>
          </div>
          <div class="shortcut" id="shortcut-restart">
            <div class="shortcut-key">CTRL+R</div>
            <div class="shortcut-desc"><span>Restart</span></div>
          </div>
          <div class="shortcut" id="shortcut-cashout">
            <div class="shortcut-key">CTRL+Space</div>
            <div class="shortcut-desc"><span>CrashOut</span></div>
          </div>
          <div class="shortcut" id="shortcut-help">
            <div class="shortcut-key">?</div>
            <div class="shortcut-desc"><span>Help</span></div>
          </div>
        </div>
      </div>
    </main>
  </body>
  <script></script>
</html>
