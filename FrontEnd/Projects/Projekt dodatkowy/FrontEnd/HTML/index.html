<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ThunderSight - browse tanks, maps, and aircraft."
    />
    <title>ThunderSight</title>
    <link rel="stylesheet" href="../CSS/style.css" />

    <script src="../JS/script.js" defer></script>
    <script src="../JS/loader.js" defer></script>
  </head>
  <body id="body-container">
    <header id="main-header">
      <div id="header-logo">
        <img
          src="../../BackEnd/Assets/Logo.png"
          alt="ThunderSight Logo"
          width="260"
          style="height: 130px; width: auto"
          decoding="async"
          loading="eager"
        />
      </div>
      <nav id="main-nav" aria-label="Primary navigation"></nav>
    </header>
    <main id="root"></main>
    <footer id="main-footer"></footer>
  </body>
</html>
