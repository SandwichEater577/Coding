# GRUB config for JewOS
# Boots the Linux kernel with our custom initramfs

set timeout=3
set default=0

menuentry "JewOS 0.1.0" {
    linux /boot/bzImage console=ttyS0 console=tty0 init=/sbin/init
    initrd /boot/initramfs.cpio.gz
}

menuentry "JewOS 0.1.0 (serial console only)" {
    linux /boot/bzImage console=ttyS0 init=/sbin/init
    initrd /boot/initramfs.cpio.gz
}
